<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ThriftMart — Demo Thrifting</title>
  <meta name="description" content="Demo toko thrifting sederhana: katalog, filter, dan keranjang." />

  <style>
    :root{
      --bg:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --soft:#f9fafb;
      --brand:#2563eb;
      --radius:12px;
      --shadow: 0 10px 30px rgba(0,0,0,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:var(--bg);
    }
    .wrap{width:min(1100px, 92vw); margin:0 auto}
    .muted{color:var(--muted)}
    .small{font-size:.9rem}

    /* Topbar */
    .topbar{
      position:sticky; top:0; z-index:10;
      background:#fff;
      border-bottom:1px solid var(--line);
    }
    .topbar__inner{
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      padding:14px 0;
    }
    .logo{
      font-weight:900; text-decoration:none; color:var(--text);
      display:flex; align-items:center; gap:10px;
    }
    .tag{
      font-size:.75rem; font-weight:700;
      padding:2px 8px; border:1px solid var(--line);
      border-radius:999px; color:var(--muted);
    }
    .search{flex:1; max-width:520px}
    .search input{
      width:100%; padding:10px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:var(--soft);
      outline:none;
    }
    .cartBtn{
      border:1px solid var(--line);
      background:var(--soft);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:800;
    }
    .count{
      display:inline-grid; place-items:center;
      min-width:22px; height:22px;
      padding:0 6px;
      border-radius:999px;
      background:var(--text);
      color:#fff;
      margin-left:6px;
      font-size:.8rem;
    }

    /* Filters */
    .panel{padding:18px 0}
    .filters{
      display:flex; flex-wrap:wrap; gap:10px;
      align-items:center;
    }
    select{
      border:1px solid var(--line);
      background:#fff;
      padding:10px 12px;
      border-radius:10px;
    }
    .btn{
      border:1px solid var(--line);
      background:#fff;
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:800;
    }
    .btn.primary{
      border-color:transparent;
      background:var(--brand);
      color:#fff;
    }
    .btn.full{width:100%}

    /* Grid */
    .grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:12px;
      padding-bottom:28px;
    }
    @media (max-width: 1000px){ .grid{grid-template-columns:repeat(3,1fr)} }
    @media (max-width: 720px){
      .grid{grid-template-columns:repeat(2,1fr)}
      .search{display:none}
    }
    @media (max-width: 420px){ .grid{grid-template-columns:1fr} }

    .card{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#fff;
      overflow:hidden;
      display:flex; flex-direction:column;
    }
    .thumb{
      height:140px;
      background:linear-gradient(135deg, #f3f4f6, #e5e7eb);
      border-bottom:1px solid var(--line);
    }
    .card__body{padding:12px; display:flex; flex-direction:column; gap:8px; flex:1}
    .title{font-weight:900}
    .meta{font-size:.9rem; color:var(--muted)}
    .price{font-weight:900}
    .row2{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:auto}
    .actions{display:flex; gap:8px}
    .icon{
      border:1px solid var(--line);
      background:#fff;
      width:38px; height:38px;
      border-radius:10px;
      cursor:pointer;
      display:inline-grid; place-items:center;
    }

    .empty{
      border:1px dashed var(--line);
      border-radius:var(--radius);
      padding:18px;
      margin:10px 0 30px;
      text-align:center;
    }

    /* Footer */
    .footer{
      border-top:1px solid var(--line);
      padding:16px 0;
      background:var(--soft);
    }
    .footer__inner{
      display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }

    /* Overlay + Drawer + Modal */
    .overlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,.35);
      z-index:20;
    }
    .drawer{
      position:fixed; top:0; right:0; z-index:30;
      width:min(420px, 92vw); height:100vh;
      background:#fff;
      border-left:1px solid var(--line);
      box-shadow: var(--shadow);
      display:flex; flex-direction:column;
    }
    .drawer__head{ position: relative; z-index: 1; }
      display:flex; justify-content:space-between; align-items:center;
      padding:14px; border-bottom:1px solid var(--line);
    }
    .drawer__body{padding:14px; overflow:auto; display:flex; flex-direction:column; gap:10px; flex:1}
    .drawer__foot{
      padding:14px; border-top:1px solid var(--line);
      background:var(--soft);
    }
    .row{display:flex; justify-content:space-between; margin:8px 0}

    .cartItem{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      display:flex; justify-content:space-between; gap:10px;
    }
    .cartItem .left{min-width:0}
    .cartTitle{font-weight:900}
    .cartMeta{color:var(--muted); font-size:.9rem}
    .qty{
      display:flex; gap:6px; align-items:center;
    }
    .qty button{
      width:34px; height:34px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:900;
    }

    .modal{
      position:fixed; z-index:40;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:min(720px, 92vw);
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .modal__head{
      display:flex; justify-content:space-between; align-items:center;
      padding:14px; border-bottom:1px solid var(--line);
    }
    .modal__body{padding:14px}
    .pm{display:grid; grid-template-columns: 1fr 1fr; gap:14px}
    .pm__img{
      height:220px;
      border:1px solid var(--line);
      border-radius:12px;
      background:linear-gradient(135deg, #f3f4f6, #e5e7eb);
    }
    @media (max-width: 720px){ .pm{grid-template-columns:1fr} }
    .pm__price{font-size:1.25rem; font-weight:900; margin:6px 0}
    .pm__meta{color:var(--muted); font-size:.95rem}

    .toast{
      position:fixed; z-index:60;
      left:50%; bottom:18px;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      padding:10px 12px;
      border-radius:999px;
      box-shadow: var(--shadow);
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="wrap topbar__inner">
      <a class="logo" href="#">ThriftMart <span class="tag">Demo</span></a>

      <div class="search">
        <input id="searchInput" type="search" placeholder="Cari produk..." />
      </div>

      <button class="cartBtn" id="openCart" type="button">
        Keranjang <span class="count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="filters">
        <select id="categoryFilter">
          <option value="all">Semua Kategori</option>
        </select>

        <select id="sizeFilter">
          <option value="all">Semua Ukuran</option>
        </select>

        <select id="sortSelect">
          <option value="newest">Terbaru</option>
          <option value="priceAsc">Harga Termurah</option>
          <option value="priceDesc">Harga Termahal</option>
        </select>

        <button class="btn" id="resetBtn" type="button">Reset</button>
      </div>
    </section>

    <section class="grid" id="productGrid" aria-live="polite"></section>

    <section class="empty" id="emptyState" hidden>
      <p>Produk tidak ditemukan.</p>
      <button class="btn primary" id="emptyReset" type="button">Reset Filter</button>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap footer__inner">
      <span>© <span id="year"></span> ThriftMart (Demo)</span>
      <span class="muted">Frontend only — data contoh</span>
    </div>
  </footer>

  <!-- Overlay + Cart Drawer -->
  <div class="overlay" id="overlay" hidden></div>

  <aside class="drawer" id="cartDrawer" hidden>
    <div class="drawer__head">
      <strong>Keranjang</strong>
      <button class="icon" id="closeCart" type="button" aria-label="Tutup">✕</button>
    </div>

    <div class="drawer__body" id="cartItems"></div>

    <div class="drawer__foot">
      <div class="row">
        <span class="muted">Subtotal</span>
        <strong id="cartSubtotal">Rp 0</strong>
      </div>

      <button class="btn primary full" id="checkoutBtn" type="button">Checkout (Demo)</button>
      <button class="btn full" id="clearBtn" type="button">Kosongkan</button>

      <p class="muted small">Checkout hanya simulasi.</p>
    </div>
  </aside>

  <!-- Product Modal -->
  <section class="modal" id="productModal" hidden aria-modal="true" role="dialog">
    <div class="modal__head">
      <strong id="pmTitle">Detail Produk</strong>
      <button class="icon" id="closeProduct" type="button" aria-label="Tutup">✕</button>
    </div>

    <div class="modal__body">
      <div class="pm">
        <div class="pm__img" aria-hidden="true"></div>
        <div class="pm__info">
          <div class="pm__meta" id="pmMeta">—</div>
          <div class="pm__price" id="pmPrice">—</div>
          <p class="muted" id="pmDesc">—</p>
          <button class="btn primary" id="pmAdd" type="button">Tambah ke Keranjang</button>
        </div>
      </div>
    </div>
  </section>

  <div class="toast" id="toast" hidden role="status" aria-live="polite"></div>

  <script>
    // ===== Data & helpers =====
    const rupiah = (n) =>
      new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR" }).format(n);

    const PRODUCTS = [
      { id:"p1", title:"Jaket Denim Vintage", brand:"Levi's", category:"Jaket", size:"L", condition:"Very Good", price:189000, stock:1, createdAt:"2026-02-20", desc:"Denim tebal, fade natural vintage." },
      { id:"p2", title:"Hoodie Basic Oversize", brand:"Uniqlo", category:"Hoodie", size:"XL", condition:"Good", price:129000, stock:2, createdAt:"2026-02-26", desc:"Hangat, nyaman. Ada pilling ringan." },
      { id:"p3", title:"Kemeja Flanel Kotak", brand:"H&M", category:"Kemeja", size:"M", condition:"Like New", price:99000, stock:1, createdAt:"2026-02-28", desc:"Flanel lembut, kondisi sangat bagus." },
      { id:"p4", title:"Celana Chino Slim", brand:"Gap", category:"Celana", size:"32", condition:"Very Good", price:139000, stock:1, createdAt:"2026-02-18", desc:"Chino rapi, jahitan aman." },
      { id:"p5", title:"T-shirt Graphic 90s", brand:"Vintage", category:"Kaos", size:"L", condition:"Fair", price:79000, stock:1, createdAt:"2026-02-14", desc:"Crack print tipis khas 90s." },
      { id:"p6", title:"Sweater Knit Minimal", brand:"Zara", category:"Sweater", size:"M", condition:"Good", price:119000, stock:1, createdAt:"2026-02-22", desc:"Knit halus untuk layering." },
      { id:"p7", title:"Jersey Retro", brand:"Nike", category:"Jersey", size:"L", condition:"Very Good", price:159000, stock:1, createdAt:"2026-02-27", desc:"Patch rapi, vibe streetwear." },
      { id:"p8", title:"Rok Pleats", brand:"Mango", category:"Rok", size:"S", condition:"Like New", price:109000, stock:1, createdAt:"2026-02-25", desc:"Pleats jatuh bagus, warna netral." },
    ];

    const LS_KEY = "thriftmart_cart_v2";

    const el = (id) => document.getElementById(id);
    const els = {
      year: el("year"),
      grid: el("productGrid"),
      empty: el("emptyState"),

      q: el("searchInput"),
      cat: el("categoryFilter"),
      size: el("sizeFilter"),
      sort: el("sortSelect"),
      reset: el("resetBtn"),
      emptyReset: el("emptyReset"),

      overlay: el("overlay"),
      drawer: el("cartDrawer"),
      openCart: el("openCart"),
      closeCart: el("closeCart"),

      cartCount: el("cartCount"),
      cartItems: el("cartItems"),
      cartSubtotal: el("cartSubtotal"),
      checkoutBtn: el("checkoutBtn"),
      clearBtn: el("clearBtn"),

      productModal: el("productModal"),
      closeProduct: el("closeProduct"),
      pmTitle: el("pmTitle"),
      pmMeta: el("pmMeta"),
      pmPrice: el("pmPrice"),
      pmDesc: el("pmDesc"),
      pmAdd: el("pmAdd"),

      toast: el("toast"),
    };

    let state = {
      q: "",
      category: "all",
      size: "all",
      sort: "newest",
      cart: loadCart(),
      openProductId: null,
    };

    function toast(msg){
      els.toast.textContent = msg;
      els.toast.hidden = false;
      clearTimeout(toast._t);
      toast._t = setTimeout(()=> els.toast.hidden = true, 1600);
    }

    function loadCart(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      }catch{ return []; }
    }
    function saveCart(){ localStorage.setItem(LS_KEY, JSON.stringify(state.cart)); }

    function uniq(arr){ return [...new Set(arr)].sort((a,b)=>String(a).localeCompare(String(b))); }
    function byNewest(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); }

    function esc(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // ===== Filtering & render =====
    function filtered(){
      let list = [...PRODUCTS];

      const q = state.q.trim().toLowerCase();
      if(q){
        list = list.filter(p => (`${p.title} ${p.brand} ${p.category} ${p.size} ${p.condition}`).toLowerCase().includes(q));
      }
      if(state.category !== "all") list = list.filter(p => p.category === state.category);
      if(state.size !== "all") list = list.filter(p => p.size === state.size);

      if(state.sort === "newest") list.sort(byNewest);
      if(state.sort === "priceAsc") list.sort((a,b)=>a.price-b.price);
      if(state.sort === "priceDesc") list.sort((a,b)=>b.price-a.price);

      return list;
    }

    function renderFilters(){
      const cats = uniq(PRODUCTS.map(p=>p.category));
      const sizes = uniq(PRODUCTS.map(p=>p.size));

      els.cat.innerHTML = `<option value="all">Semua Kategori</option>` + cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");
      els.size.innerHTML = `<option value="all">Semua Ukuran</option>` + sizes.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");

      els.cat.value = state.category;
      els.size.value = state.size;
      els.sort.value = state.sort;
      els.q.value = state.q;
    }

    function card(p){
      return `
        <article class="card">
          <div class="thumb" aria-hidden="true"></div>
          <div class="card__body">
            <div class="title">${esc(p.title)}</div>
            <div class="meta">${esc(p.brand)} • ${esc(p.category)} • Size ${esc(p.size)}</div>
            <div class="row2">
              <div class="price">${rupiah(p.price)}</div>
              <div class="actions">
                <button class="icon" id="view-${p.id}" type="button" aria-label="Detail">👁️</button>
                <button class="btn primary" id="add-${p.id}" type="button">Tambah</button>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderProducts(){
      const list = filtered();
      els.grid.innerHTML = list.map(card).join("");
      els.empty.hidden = list.length !== 0;

      list.forEach(p=>{
        el(`view-${p.id}`)?.addEventListener("click", ()=> openProduct(p.id));
        el(`add-${p.id}`)?.addEventListener("click", ()=> addToCart(p.id, 1));
      });
    }

    // ===== Product modal =====
    function openProduct(id){
      const p = PRODUCTS.find(x=>x.id===id);
      if(!p) return;
      state.openProductId = id;

      els.pmTitle.textContent = p.title;
      els.pmMeta.textContent = `${p.brand} • ${p.category} • Size ${p.size} • ${p.condition} • Stock ${p.stock}`;
      els.pmPrice.textContent = rupiah(p.price);
      els.pmDesc.textContent = p.desc;
      els.pmAdd.disabled = p.stock <= 0;

      openOverlay();
      els.productModal.hidden = false;
    }
    function closeProduct(){
      state.openProductId = null;
      els.productModal.hidden = true;
      closeOverlayIfNothingOpen();
    }

    // ===== Cart =====
    function cartCount(){ return state.cart.reduce((s,it)=>s+it.qty,0); }
    function cartSubtotal(){
      return state.cart.reduce((sum,it)=>{
        const p = PRODUCTS.find(x=>x.id===it.productId);
        return p ? sum + (p.price * it.qty) : sum;
      },0);
    }

    function addToCart(productId, qty){
      const p = PRODUCTS.find(x=>x.id===productId);
      if(!p) return;

      const it = state.cart.find(x=>x.productId===productId);
      const cur = it ? it.qty : 0;
      const next = Math.min(p.stock, cur + qty);
      if(next <= cur) return toast("Stok tidak cukup.");

      if(it) it.qty = next;
      else state.cart.push({ productId, qty: next });

      saveCart();
      renderCart();
      toast("Masuk keranjang ✅");
    }

    function dec(productId){
      const idx = state.cart.findIndex(x=>x.productId===productId);
      if(idx < 0) return;
      state.cart[idx].qty -= 1;
      if(state.cart[idx].qty <= 0) state.cart.splice(idx,1);
      saveCart(); renderCart();
    }
    function inc(productId){
      const p = PRODUCTS.find(x=>x.id===productId);
      const it = state.cart.find(x=>x.productId===productId);
      if(!p || !it) return;
      if(it.qty >= p.stock) return toast("Maks sesuai stok.");
      it.qty += 1;
      saveCart(); renderCart();
    }
    function clearCart(){
      state.cart = [];
      saveCart(); renderCart();
      toast("Keranjang dikosongkan.");
    }

    function cartRow(it){
      const p = PRODUCTS.find(x=>x.id===it.productId);
      if(!p) return "";
      return `
        <div class="cartItem">
          <div class="left">
            <div class="cartTitle">${esc(p.title)}</div>
            <div class="cartMeta">${esc(p.category)} • Size ${esc(p.size)} • ${esc(p.condition)}</div>
            <div class="cartMeta">${rupiah(p.price)}</div>
          </div>
          <div class="qty">
            <button type="button" id="dec-${p.id}" aria-label="Kurangi">−</button>
            <strong>${it.qty}</strong>
            <button type="button" id="inc-${p.id}" aria-label="Tambah">+</button>
          </div>
        </div>
      `;
    }

    function renderCart(){
      const count = cartCount();
      els.cartCount.textContent = String(count);

      if(state.cart.length === 0){
        els.cartItems.innerHTML = `<div class="muted">Keranjang masih kosong.</div>`;
        els.checkoutBtn.disabled = true;
        els.clearBtn.disabled = true;
      }else{
        els.cartItems.innerHTML = state.cart.map(cartRow).join("");
        state.cart.forEach(it=>{
          el(`dec-${it.productId}`)?.addEventListener("click", ()=> dec(it.productId));
          el(`inc-${it.productId}`)?.addEventListener("click", ()=> inc(it.productId));
        });
        els.checkoutBtn.disabled = false;
        els.clearBtn.disabled = false;
      }

      els.cartSubtotal.textContent = rupiah(cartSubtotal());
    }

    // ===== Overlay + drawer =====
    function openOverlay(){ els.overlay.hidden = false; }
    function closeOverlayIfNothingOpen(){
      const somethingOpen = !els.drawer.hidden || !els.productModal.hidden;
      if(!somethingOpen) els.overlay.hidden = true;
    }

    function openCart(){
      openOverlay();
      els.drawer.hidden = false;
      renderCart();
    }
    function closeCart(){
      els.drawer.hidden = true;
      closeOverlayIfNothingOpen();
    }

    function closeAll(){
      els.drawer.hidden = true;
      els.productModal.hidden = true;
      els.overlay.hidden = true;
      state.openProductId = null;
    }

    // ===== Events =====
    function wire(){
      els.year.textContent = String(new Date().getFullYear());

      els.q.addEventListener("input", (e)=>{ state.q = e.target.value; renderProducts(); });
      els.cat.addEventListener("change", (e)=>{ state.category = e.target.value; renderProducts(); });
      els.size.addEventListener("change", (e)=>{ state.size = e.target.value; renderProducts(); });
      els.sort.addEventListener("change", (e)=>{ state.sort = e.target.value; renderProducts(); });

      const resetAll = ()=>{
        state.q = "";
        state.category = "all";
        state.size = "all";
        state.sort = "newest";
        renderFilters();
        renderProducts();
      };
      els.reset.addEventListener("click", resetAll);
      els.emptyReset.addEventListener("click", resetAll);

      els.openCart.addEventListener("click", openCart);
      els.closeCart.addEventListener("click", (e) => {
        e.stopPropagation();     // penting biar click nggak “nyampe” ke overlay
        closeAll();              // tutup semuanya sekalian (paling stabil)
      });
      els.clearBtn.addEventListener("click", clearCart);

      els.pmAdd.addEventListener("click", ()=>{
        if(state.openProductId) addToCart(state.openProductId, 1);
      });
      els.closeProduct.addEventListener("click", closeProduct);

      els.overlay.addEventListener("click", closeAll);        // ✅ klik gelap tutup
      document.addEventListener("keydown", (e)=>{
        if(e.key === "Escape") closeAll();                   // ✅ ESC tutup
      });

      els.checkoutBtn.addEventListener("click", ()=>{
        if(state.cart.length === 0) return;
        clearCart();
        closeCart();
        toast("Checkout berhasil (demo) 🎉");
      });
    }

    function init(){
      renderFilters();
      renderProducts();
      renderCart();
      wire();
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
